name: 'Languine'
description: 'Self-hosted automated localization powered by your own Languine deployment'
author: 'languine'

inputs:
  api-key:
    description: 'Languine API key (set in your Vercel project as LANGUINE_API_KEY)'
    required: true
  base-url:
    description: 'URL of your Languine deployment (e.g. https://languine.your-team.vercel.app)'
    required: true
  project-id:
    description: 'Languine project ID'
    required: true
  cli-version:
    description: 'Version of the Languine CLI to use'
    required: false
    default: 'latest'
  create-pull-request:
    description: 'Create a pull request instead of committing directly'
    required: false
    default: 'false'
  commit-message:
    description: 'Custom commit message'
    required: false
  pr-title:
    description: 'Title for the pull request'
    required: false
  working-directory:
    description: 'Working directory relative to repository root'
    required: false

runs:
  using: 'docker'
  image: 'packages/action/Dockerfile'
  env:
    LANGUINE_API_KEY: ${{ inputs.api-key }}
    LANGUINE_BASE_URL: ${{ inputs.base-url }}
    LANGUINE_PROJECT_ID: ${{ inputs.project-id }}
    LANGUINE_CLI_VERSION: ${{ inputs.cli-version }}
    LANGUINE_WORKING_DIRECTORY: ${{ inputs.working-directory }}
    LANGUINE_CREATE_PULL_REQUEST: ${{ inputs.create-pull-request }}
    LANGUINE_COMMIT_MESSAGE: ${{ inputs.commit-message }}
    LANGUINE_PR_TITLE: ${{ inputs.pr-title }}

branding:
  icon: 'git-merge'
  color: 'black'
